<!DOCTYPE html>
<html>
<head>
  <title>Map Tool</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    html, body {
      margin: 0;
      height: 100%;
      font-family: sans-serif;
    }

    #map {
      height: 100%;
      width: 100%;
    }

    #sidebar {
      position: absolute;
      top: 0;
      left: 0;
      width: 300px;
      height: 100%;
      background: white;
      overflow-y: auto;
      padding: 10px;
      box-shadow: 2px 0 5px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    #map {
      margin-left: 300px;
    }

    .circle-item {
      border-bottom: 1px solid #ddd;
      padding: 8px 0;
    }
  </style>
</head>

<body>

<div id="sidebar">
  <h3>Circles</h3>
  <div id="circleList"></div>

  <hr>

  <label>
    Radius (miles):
    <input id="radiusInput" type="number" value="100">
  </label>

  <br><br>

  <button id="addBtn">Add to map</button>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>
<script src="script2.js?v=3"></script>

</body>
</html>

<button id="toggleSidebar">Toggle Circles</button>
